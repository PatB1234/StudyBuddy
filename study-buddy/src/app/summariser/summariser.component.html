<div class="summariser">

    <h2>Summariser</h2>
    <button mat-raised-button (click)="summariseButton()" style="margin-right: 10px;">Summarise</button>
    <button mat-raised-button (click)="downloadPdf()" style="margin-left: 10px;">Download your summary</button>
    <markdown katex [data]="summary" class="markdown-output"></markdown>

    <div #pdfContent style="position:absolute; left:-9999px; top:0; width:800px; padding:40px; background:white;">
        <markdown katex [data]="summary"></markdown>
    </div>
</div>
